# =============================================================================
# Claude Dotfiles — Centralized Configuration
# =============================================================================
#
# This file is the source of truth for all service and workflow configuration.
# It is committed to the repo (no secrets allowed). Machine-specific overrides
# should use environment variables or local override files.
#
# Structure: each service or workflow gets its own top-level section.
# Use kebab-case keys. Document every field with a comment.
#
# Read values with: yq '.section.key' config.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# gh-monitor — GitHub monitor for @claude PR comment automation
# -----------------------------------------------------------------------------
gh-monitor:
  # Folders containing git repos to monitor (scanned for subdirs with .git)
  # Folders that don't exist on this machine are silently skipped
  repo-folders: "~/Repos /opt/skyy-net"

  # Global safety cap on concurrent workflow script processes (revision.sh,
  # revision-major.sh, plan-revision.sh, build-phase.sh). Counts BOTH manual
  # terminal invocations AND gh-monitor dispatches. Does NOT count interactive
  # claude sessions. Same-PR concurrency is handled separately (per-PR check
  # serializes comments against the same PR to prevent branch-push races).
  # This cap exists to prevent runaway spawning during comment floods, not to
  # serialize normal multi-PR work. Raise if you commonly run many engineers.
  max-concurrent: 5

  # Route enablement (set to false to disable specific command routes)
  enable-revision: true
  enable-revision-major: true
  enable-plan-revision: true
  enable-build-phase: true
  enable-help: true

  # Dry run mode (detect comments and log, but don't run workflows)
  dry-run: false

  # Skip comments older than this many days
  backlog-days: 7

  # Path to workflow scripts (leave empty to auto-detect from repo root)
  # workflow-dir: ""
